<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Sport — Admin</title>
  <link rel="icon" type="image/jpeg" href="/img/IMG_2888.JPG.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-logo">
      <img src="/img/IMG_2888.JPG.jpeg" alt="Human Sport">
    </div>
    <div class="login-card">
      <h1>Panel de Administración</h1>
      <p class="login-sub">Ingresá para gestionar tu tienda</p>

      <div id="loginError" class="alert alert-error" style="display:none"></div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="admin@humansport.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span>Ingresar</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <a href="/" class="back-to-store">
        <i class="fas fa-store"></i> Ver la tienda
      </a>
    </div>
  </div>

  <script>
    // Si ya hay token válido, ir al dashboard
    const token = localStorage.getItem('hs_admin_token');
    if (token) window.location.href = '/admin/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ingresando...';
      err.style.display = 'none';

      try {
        const res  = await fetch('/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        localStorage.setItem('hs_admin_token', json.data.token);
        localStorage.setItem('hs_admin_user', JSON.stringify(json.data.user));
        window.location.href = '/admin/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message || 'Error al iniciar sesión';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<span>Ingresar</span><i class="fas fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
